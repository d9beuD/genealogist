life_line:
    not_all_dated: |
        Not all events were dated, so they could not be automatically
        sorted chronologically.
    birth.label: Birth
    birth.message: >-
        **{name}** was born{place, select,
            empty {}
            other { in {place}}
        }{year, select,
            empty {}
            other { in {year}}
        }.
    death.label: Death
    death.message: >-
        **{name}** died{place, select,
            empty {}
            other { in {place}}
        }{year, select,
            empty {}
            other { in {year}}
        }.
    union.label: Union
    union.message: >-
        **{name}** united with **[{partner}]({partner_path})**{place, select,
            empty {}
            other { in {place}}
        }{year, select,
            empty {}
            other { in {year}}
        }.
    child.label: Child
    child.message: >-
        **{name}** had **[{child}]({child_path})** as a child{year, select,
            empty {}
            other { in {year}}
        }.
